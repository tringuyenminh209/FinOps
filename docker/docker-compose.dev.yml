version: '3.9'

services:
  # ── インフラ ──
  postgres:
    image: postgres:15-alpine
    container_name: finops-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finops_dev
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: finops-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns,eventbridge,s3,sts,ssm,cloudwatch
      DEFAULT_REGION: ap-northeast-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── アプリケーション（オプション: --profile app で起動） ──
  backend:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: finops-backend
    profiles: ["app"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://finops:finops_dev_password@postgres:5432/finops_dev
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: finops-frontend
    profiles: ["app"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:

networks:
  default:
    name: finops-network
