version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finops-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finops_dev
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: finops-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns,eventbridge,s3,sts,ssm,cloudwatch
      DEFAULT_REGION: ap-northeast-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  localstack_data:

networks:
  default:
    name: finops-network
